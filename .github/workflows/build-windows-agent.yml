name: Build ThermopacAgent Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Agent version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
  push:
    paths:
      - 'local-agent/**'
    branches:
      - main

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    defaults:
      run:
        working-directory: local-agent

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python 3.11 ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywin32 requests pyinstaller
          python -m pip install pywin32-ctypes

      # ── PyInstaller — build ThermopacAgent.exe ───────────────────────────────
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --name ThermopacAgent `
            --onedir `
            --console `
            --clean `
            --noconfirm `
            --add-data "config.ini;." `
            --add-data "extractor;extractor" `
            --add-data "agent;agent" `
            --hidden-import win32com `
            --hidden-import win32com.client `
            --hidden-import pythoncom `
            --hidden-import pywintypes `
            --hidden-import win32api `
            --hidden-import win32con `
            --hidden-import requests `
            --hidden-import configparser `
            --paths agent `
            --paths extractor `
            agent\main.py

      # ── Verify EXE exists ────────────────────────────────────────────────────
      - name: Verify EXE
        run: |
          if (!(Test-Path "dist\ThermopacAgent\ThermopacAgent.exe")) {
            Write-Error "ThermopacAgent.exe not found after PyInstaller build"
            exit 1
          }
          Write-Host "EXE size: $((Get-Item 'dist\ThermopacAgent\ThermopacAgent.exe').Length / 1MB) MB"

      # ── Run startup test (no SolidWorks needed) ──────────────────────────────
      - name: Run agent self-test (--test mode)
        env:
          THERMOPAC_API_URL: ${{ secrets.THERMOPAC_API_URL }}
          THERMOPAC_NODE_ID: ${{ secrets.THERMOPAC_NODE_ID }}
          THERMOPAC_NODE_TOKEN: ${{ secrets.THERMOPAC_NODE_TOKEN }}
        run: |
          # Run --test mode: verifies startup + cloud connection without SolidWorks
          dist\ThermopacAgent\ThermopacAgent.exe --test `
            --api-url "$env:THERMOPAC_API_URL" `
            --node-id "$env:THERMOPAC_NODE_ID" `
            --node-token "$env:THERMOPAC_NODE_TOKEN"
        continue-on-error: true   # non-fatal if cloud creds not set in CI

      # ── Inno Setup 6 ────────────────────────────────────────────────────────
      - name: Install Inno Setup 6
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          $out = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          Write-Host "Inno Setup installed"

      # ── Patch version into .iss ──────────────────────────────────────────────
      - name: Patch version in setup.iss
        run: |
          $version = "${{ github.event.inputs.version || '1.0.0' }}"
          (Get-Content "installer\setup.iss") `
            -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion      `"$version`"" |
            Set-Content "installer\setup.iss"
          Write-Host "Version patched: $version"

      # ── Build installer ──────────────────────────────────────────────────────
      - name: Build Inno Setup installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          & $iscc "installer\setup.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC failed with exit code $LASTEXITCODE"
            exit 1
          }

      # ── Verify installer ─────────────────────────────────────────────────────
      - name: Verify installer
        run: |
          $version = "${{ github.event.inputs.version || '1.0.0' }}"
          $installer = "installer_output\ThermopacAgent-Setup-v$version.exe"
          if (!(Test-Path $installer)) {
            # List what was generated
            Get-ChildItem installer_output\ -ErrorAction SilentlyContinue
            Write-Error "Installer not found: $installer"
            exit 1
          }
          $size = (Get-Item $installer).Length / 1MB
          Write-Host "✅ Installer: $installer ($([math]::Round($size,1)) MB)"

      # ── Compute SHA-256 checksums ────────────────────────────────────────────
      - name: Compute checksums
        run: |
          $version = "${{ github.event.inputs.version || '1.0.0' }}"
          $installer = "installer_output\ThermopacAgent-Setup-v$version.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $installer).Hash.ToLower()
          Write-Host "SHA-256: $hash"
          "$hash  ThermopacAgent-Setup-v$version.exe" | Out-File "installer_output\SHA256SUMS.txt"

      # ── Upload installer artifact ────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThermopacAgent-Setup-v${{ github.event.inputs.version || '1.0.0' }}
          path: |
            local-agent/installer_output/ThermopacAgent-Setup-v*.exe
            local-agent/installer_output/SHA256SUMS.txt
          retention-days: 30

      # ── Upload dist folder (raw EXE + files, for debugging) ──────────────────
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThermopacAgent-dist-v${{ github.event.inputs.version || '1.0.0' }}
          path: local-agent/dist/ThermopacAgent/
          retention-days: 7
