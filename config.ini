[cloud]
; Thermopac ERP URL (no trailing slash)
api_url    = https://thermopac-communication-thermopacllp.replit.app

; Unique node identifier — provided by Thermopac admin
node_id    = PC-DESIGN-01

; Per-node authentication token — provided by Thermopac admin (keep secret)
node_token = REPLACE_WITH_YOUR_TOKEN

[agent]
; Seconds between poll cycles
poll_interval_sec = 10

; Maximum seconds for a single job (download + extraction + upload)
; If exceeded the job is marked failed and SolidWorks is shut down
job_timeout_sec = 600

; Maximum retry attempts before a job is permanently failed
max_retries = 3

[paths]
; Working directory for temp files during extraction
temp_dir = C:\ThermopacAgent\temp

; Directory for log files (daily rotation, 30-day retention)
log_dir = C:\ThermopacAgent\logs

[solidworks]
; Major SolidWorks version installed on this machine
; Supported: 2019, 2020, 2021, 2022, 2023, 2024
solidworks_version = 2024

; Optional: override COM ProgID directly (leave blank to auto-resolve from version)
; Example: SldWorks.Application.32
; solidworks_progid =

; Show SolidWorks window during extraction (true = visible, for debugging only)
visible = false
