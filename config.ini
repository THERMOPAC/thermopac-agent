; ThermopacAgent — configuration file
; ─────────────────────────────────────────────────────────────
; MODES
;   testing    — auto-generates token, self-registers with cloud
;                (cloud must have AGENT_AUTO_REGISTER=true)
;   production — requires cloud/admin-issued token, no auto-reg
; ─────────────────────────────────────────────────────────────
;
; AUTO-FILLED when blank:
;   node_id             → Windows machine name
;   api_url             → http://localhost:3000
;   solidworks_version  → auto-detected from registry (when 0)
;
; REQUIRED in production mode:
;   node_token          → must be set manually (cloud-issued)

[cloud]
; API base URL — no trailing slash
api_url    = https://5d05ae61-8225-4651-bb76-b4e20a4ddabb-00-3mex6zlihlmft.janeway.replit.dev

; Node identifier — leave blank to auto-fill from machine name
node_id    =

; Authentication token
; testing mode  — leave as placeholder; token will be auto-generated
; production mode — paste the token issued by Thermopac admin
node_token = REPLACE_WITH_YOUR_TOKEN

[agent]
; testing | production  (see header notes above)
mode = testing

poll_interval_sec = 10
job_timeout_sec   = 600
max_retries       = 3

[paths]
temp_dir = C:\ThermopacAgent\temp
log_dir  = C:\ThermopacAgent\logs

[solidworks]
; 0 = auto-detect from registry; or set explicitly: 2019 2020 2021 2022 2023 2024
solidworks_version = 0
; solidworks_progid =
visible = false

; Semicolon-separated list of root folders where SolidWorks should search for
; referenced parts and assemblies when opening drawings.
; Required for full-mode open when parts are NOT in the same folder as the drawing.
; Example:  C:\SolidWorks Projects;D:\CAD Vault
model_search_path =
