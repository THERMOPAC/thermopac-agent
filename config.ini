; Thermopac Drawing Structuring Agent — Configuration
; Version: v1.0.24
; Edit this file before running bootstrap.bat
;
; See INSTALL.md for full configuration guide.

[cloud]
; API endpoint — do not change unless instructed
api_url    = https://thermopac-communication-thermopacllp.replit.app
; Node ID — a short unique name for this PC (must match admin-registered node)
; Example: PC-STRUCTURER-01  or  DS-WORKSTATION-CAD
node_id    = PC-STRUCTURER-01
; Node token — issued by Thermopac admin (keep secret, never share)
node_token = REPLACE_WITH_YOUR_TOKEN

[agent]
; testing  — auto-generates token and self-registers (for dev / first setup)
; production — requires admin-issued token, no auto-generation
mode = testing

poll_interval_sec = 10
job_timeout_sec   = 600
max_retries       = 3

[paths]
temp_dir = C:\ThermopacStructurer\temp
log_dir  = C:\ThermopacStructurer\logs

[solidworks]
; Explicit ProgID — takes priority over solidworks_version auto-detect.
; SolidWorks 2019 = SldWorks.Application.27  (this site's installed version)
; SolidWorks 2020 = SldWorks.Application.28
; SolidWorks 2021 = SldWorks.Application.29
; SolidWorks 2022 = SldWorks.Application.30
; SolidWorks 2023 = SldWorks.Application.31
; SolidWorks 2024 = SldWorks.Application.32
solidworks_progid = SldWorks.Application.27
; solidworks_version = 0   (unused when solidworks_progid is set)
visible = false

[structurer]
; REQUIRED: Full path to the standard SolidWorks drawing template (.drwdot)
; The agent creates new drawings from this template.
; Example: C:\SolidWorks Templates\Standard_A1.drwdot
; Example: \\fileserver\CAD_Templates\Thermopac_Standard_A1.drwdot
template_path =

; Root directory for staged .slddrw output files.
; Subdirectories are created automatically per drawing_control_id.
; Output path: {staging_root}\{drawingControlId}\{DrawingNumber}_rev-{Revision}.slddrw
; Example: C:\ThermopacStaging\drawings
; Example: \\fileserver\staging\drawings
staging_root = C:\ThermopacStaging\drawings
